<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f9f8f5;
    --surface: #ffffff;
    --border: rgba(0,0,0,0.1);
    --text: #1a1a1a;
    --muted: #888;
    --accent: #4a6fa5;
    --accent-light: #e8edf5;
    --done-color: #b0b0b0;
    --danger: #c0392b;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #141414;
      --surface: #1e1e1e;
      --border: rgba(255,255,255,0.1);
      --text: #e8e8e8;
      --muted: #666;
      --accent: #7eaad4;
      --accent-light: #1e2a38;
      --done-color: #444;
      --danger: #e57373;
    }
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1.5rem;
  }

  .container {
    width: 100%;
    max-width: 820px;
    display: grid;
    grid-template-columns: 1fr 280px;
    grid-template-rows: auto auto;
    gap: 1.5rem;
  }

  /* Clock */
  .clock-area {
    grid-column: 1 / -1;
    text-align: center;
    padding-bottom: 0.5rem;
  }

  #clock {
    font-size: clamp(3rem, 8vw, 5.5rem);
    font-weight: 200;
    letter-spacing: -2px;
    line-height: 1;
    color: var(--text);
  }

  #date {
    font-size: 0.95rem;
    color: var(--muted);
    margin-top: 6px;
    letter-spacing: 0.04em;
  }

  /* Cards */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.5rem;
  }

  .card-label {
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 1rem;
  }

  /* Todo */
  .todo-card { grid-column: 1; }

  #todo-input-row {
    display: flex;
    gap: 8px;
    margin-bottom: 1rem;
  }

  #todo-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 0.9rem;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }

  #todo-input:focus { border-color: var(--accent); }
  #todo-input::placeholder { color: var(--muted); }

  #todo-add-btn {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 8px 16px;
    font-size: 0.9rem;
    cursor: pointer;
    transition: opacity 0.15s;
    flex-shrink: 0;
  }

  #todo-add-btn:hover { opacity: 0.85; }

  #todo-list { list-style: none; }

  .todo-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 4px;
    border-bottom: 1px solid var(--border);
    group: true;
  }

  .todo-item:last-child { border-bottom: none; }

  .todo-check {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s, border-color 0.15s;
    background: transparent;
  }

  .todo-check.checked {
    background: var(--accent);
    border-color: var(--accent);
  }

  .todo-check.checked::after {
    content: '';
    width: 5px;
    height: 9px;
    border: 2px solid #fff;
    border-top: none;
    border-left: none;
    transform: rotate(45deg) translate(-1px, -1px);
    display: block;
  }

  .todo-text {
    flex: 1;
    font-size: 0.9rem;
    line-height: 1.4;
    cursor: text;
    outline: none;
    border: none;
    background: transparent;
    color: var(--text);
    padding: 0;
  }

  .todo-text.done {
    text-decoration: line-through;
    color: var(--done-color);
  }

  .todo-delete {
    opacity: 0;
    background: none;
    border: none;
    color: var(--danger);
    cursor: pointer;
    font-size: 1.1rem;
    padding: 0 2px;
    line-height: 1;
    transition: opacity 0.15s;
  }

  .todo-item:hover .todo-delete { opacity: 0.6; }
  .todo-delete:hover { opacity: 1 !important; }

  .empty-state {
    text-align: center;
    color: var(--muted);
    font-size: 0.85rem;
    padding: 1.5rem 0;
  }

  /* Goal card */
  .goal-card { grid-column: 2; }

  #goal-text {
    font-size: 0.95rem;
    line-height: 1.6;
    color: var(--text);
    margin-bottom: 1.25rem;
  }

  #goal-text em {
    font-style: normal;
    color: var(--accent);
    font-weight: 500;
  }

  .goal-actions {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .goal-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 12px;
    font-size: 0.8rem;
    color: var(--muted);
    cursor: pointer;
    text-align: left;
    transition: background 0.15s, color 0.15s;
  }

  .goal-btn:hover {
    background: var(--accent-light);
    color: var(--accent);
    border-color: var(--accent);
  }

  #goal-progress {
    margin-top: 1rem;
  }

  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 0.75rem;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .progress-track {
    height: 4px;
    background: var(--bg);
    border-radius: 2px;
    overflow: hidden;
  }

  #progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.3s ease;
  }

  /* Responsive */
  @media (max-width: 600px) {
    .container {
      grid-template-columns: 1fr;
    }
    .goal-card { grid-column: 1; }
  }
</style>
</head>
<body>

<div class="container">

  <div class="clock-area">
    <div id="clock">00:00</div>
    <div id="date"></div>
  </div>

  <div class="card todo-card">
    <div class="card-label">To-do</div>
    <div id="todo-input-row">
      <input id="todo-input" type="text" placeholder="Add a task..." autocomplete="off" />
      <button id="todo-add-btn">Add</button>
    </div>
    <ul id="todo-list"></ul>
  </div>

  <div class="card goal-card">
    <div class="card-label">This week's goal</div>
    <div id="goal-text"></div>
    <div class="goal-actions">
      <button class="goal-btn" id="btn-new-goal">&#8635; New goal</button>
      <button class="goal-btn" id="btn-done-goal">&#10003; Mark as done</button>
    </div>
    <div id="goal-progress">
      <div class="progress-label">
        <span>Weekly progress</span>
        <span id="progress-pct">0%</span>
      </div>
      <div class="progress-track">
        <div id="progress-fill" style="width: 0%"></div>
      </div>
    </div>
  </div>

</div>

<script>
const GOALS = [
  "Read for at least <em>20 minutes</em> every day this week.",
  "Go for a <em>walk or run</em> at least 3 times.",
  "Cook a <em>new recipe</em> you've never tried before.",
  "Spend one evening completely <em>offline</em>.",
  "Reach out to a <em>friend or family member</em> you haven't spoken to in a while.",
  "Wake up <em>30 minutes earlier</em> each morning.",
  "Drink <em>8 glasses of water</em> every day.",
  "Spend 15 minutes <em>tidying or organising</em> your space each day.",
  "Write down <em>3 things you're grateful for</em> each morning.",
  "Complete one task you've been <em>putting off</em> all month.",
  "Learn something <em>completely new</em> — a skill, a word, a recipe.",
  "Take a proper <em>lunch break</em> away from your screen every day.",
  "Get to bed by <em>10:30 PM</em> every night.",
  "Spend 10 minutes <em>stretching or meditating</em> each day.",
  "Finish a book you <em>started but never completed</em>.",
  "Try a <em>new genre of music</em> or podcast.",
  "Have one <em>screen-free meal</em> every day.",
  "Write a short <em>journal entry</em> each evening.",
  "Do something <em>kind for someone else</em> without being asked.",
  "Spend at least one hour on a <em>creative hobby</em> this week.",
];

// Clock
function updateClock() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  document.getElementById('clock').textContent = h + ':' + m;
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('date').textContent =
    days[now.getDay()] + ', ' + now.getDate() + ' ' + months[now.getMonth()];
}
updateClock();
setInterval(updateClock, 10000);

// Storage helpers
function save(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch(e){}
}
function load(key, def) {
  try {
    const v = localStorage.getItem(key);
    return v !== null ? JSON.parse(v) : def;
  } catch(e) { return def; }
}

// --- TODO LIST ---
let todos = load('hp_todos', []);

function saveTodos() { save('hp_todos', todos); }

function renderTodos() {
  const list = document.getElementById('todo-list');
  if (todos.length === 0) {
    list.innerHTML = '<li class="empty-state">Nothing yet — add your first task.</li>';
    return;
  }
  list.innerHTML = '';
  todos.forEach((todo, i) => {
    const li = document.createElement('li');
    li.className = 'todo-item';

    const check = document.createElement('div');
    check.className = 'todo-check' + (todo.done ? ' checked' : '');
    check.addEventListener('click', () => {
      todos[i].done = !todos[i].done;
      saveTodos();
      renderTodos();
    });

    const text = document.createElement('div');
    text.className = 'todo-text' + (todo.done ? ' done' : '');
    text.textContent = todo.text;
    text.contentEditable = true;
    text.spellcheck = false;
    text.addEventListener('blur', () => {
      const val = text.textContent.trim();
      if (val === '') {
        todos.splice(i, 1);
      } else {
        todos[i].text = val;
      }
      saveTodos();
      renderTodos();
    });
    text.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); text.blur(); }
    });

    const del = document.createElement('button');
    del.className = 'todo-delete';
    del.textContent = '×';
    del.title = 'Delete';
    del.addEventListener('click', () => {
      todos.splice(i, 1);
      saveTodos();
      renderTodos();
    });

    li.appendChild(check);
    li.appendChild(text);
    li.appendChild(del);
    list.appendChild(li);
  });
}

function addTodo() {
  const input = document.getElementById('todo-input');
  const val = input.value.trim();
  if (!val) return;
  todos.push({ text: val, done: false });
  saveTodos();
  renderTodos();
  input.value = '';
  input.focus();
}

document.getElementById('todo-add-btn').addEventListener('click', addTodo);
document.getElementById('todo-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') addTodo();
});

renderTodos();

// --- WEEKLY GOAL ---
function getWeekKey() {
  const now = new Date();
  const jan1 = new Date(now.getFullYear(), 0, 1);
  const week = Math.ceil(((now - jan1) / 86400000 + jan1.getDay() + 1) / 7);
  return now.getFullYear() + '-W' + week;
}

let goalData = load('hp_goal', {});
const weekKey = getWeekKey();

if (!goalData[weekKey]) {
  const pick = GOALS[Math.floor(Math.random() * GOALS.length)];
  goalData[weekKey] = { text: pick, done: false, progress: 0 };
  save('hp_goal', goalData);
}

function renderGoal() {
  const g = goalData[weekKey];
  document.getElementById('goal-text').innerHTML = g.done
    ? '<span style="color:var(--accent)">&#10003; Goal complete!</span><br><small style="color:var(--muted)">' + g.text.replace(/<em>|<\/em>/g,'') + '</small>'
    : g.text;
  const pct = Math.min(100, g.progress || 0);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-pct').textContent = pct + '%';
}

document.getElementById('btn-new-goal').addEventListener('click', () => {
  const current = goalData[weekKey].text;
  let pick;
  do { pick = GOALS[Math.floor(Math.random() * GOALS.length)]; } while (pick === current);
  goalData[weekKey] = { text: pick, done: false, progress: 0 };
  save('hp_goal', goalData);
  renderGoal();
});

document.getElementById('btn-done-goal').addEventListener('click', () => {
  goalData[weekKey].done = true;
  goalData[weekKey].progress = 100;
  save('hp_goal', goalData);
  renderGoal();
});

// Increment progress on each page load (up to 95% until marked done)
if (!goalData[weekKey].done) {
  const visits = (goalData[weekKey].visits || 0) + 1;
  goalData[weekKey].visits = visits;
  goalData[weekKey].progress = Math.min(95, Math.round((visits / 7) * 100));
  save('hp_goal', goalData);
}

renderGoal();
</script>
</body>
</html>
